name: API Tests

# Pipeline: roda o Health Check primeiro. Só se ele passar, dispara em paralelo
# as suites de Contract e Functional (ambas dependem do job healthcheck).
#
# Autenticação: cada job loga sozinho via POST /auth/login no início da suite
# (ver AuthTokenProvider) usando as credenciais abaixo — não há mais token
# fixo pra renovar manualmente (os JWTs dessa API expiram em ~24h).
#
# Pré-requisito: configurar os secrets CI_AUTH_EMAIL e CI_AUTH_PASSWORD no
# repositório (Settings > Secrets and variables > Actions). Idealmente uma
# conta de serviço dedicada para CI, não uma conta pessoal — a API goTest
# ainda não expõe API key/service account, então login com usuário e senha
# é a única forma programática disponível hoje.
#
# O job healthcheck faz um login de teste antes de rodar a suite e falha
# rápido com mensagem clara se as credenciais estiverem erradas.
# O servidor goTest fica off em janelas de manutenção (dias úteis 23h–07h BR,
# fins de semana 08h–17h BR) — execuções nesses horários vão falhar com 503.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BASEURL: https://gotest.com.br/api/api
  DEFAULT_PROJECT_ID: b4a9db3b-9ef8-4734-99ed-d54dc1585803
  DEFAULT_SUITE_ID: 71c34269-e35e-4868-9518-9449e65b2da7
  AUTH_EMAIL: ${{ secrets.CI_AUTH_EMAIL }}
  AUTH_PASSWORD: ${{ secrets.CI_AUTH_PASSWORD }}
  LOG_ENABLED: "false"

jobs:
  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Verificar credenciais de CI
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$BASEURL/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"user\":\"$AUTH_EMAIL\",\"password\":\"$AUTH_PASSWORD\",\"rememberMe\":false}")
          if [ "$status" != "200" ]; then
            echo "::error::Login falhou (POST /auth/login retornou $status). Verifique os secrets CI_AUTH_EMAIL/CI_AUTH_PASSWORD no repositório."
            exit 1
          fi
          echo "Credenciais de CI válidas."
      - name: Run Health Check suite
        run: mvn -B test -Phealthcheck
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-healthcheck
          path: target/allure-results
          if-no-files-found: ignore

  contract:
    name: Contract
    needs: healthcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Run Contract suite
        run: mvn -B test -Pcontract
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-contract
          path: target/allure-results
          if-no-files-found: ignore

  functional:
    name: Functional
    needs: healthcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Run Functional suite
        run: mvn -B test -Pfunctional
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-functional
          path: target/allure-results
          if-no-files-found: ignore
